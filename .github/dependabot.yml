# Dependabot configuration for schwab-readonly-mcp.
#
# Stance:
#   - Security updates: ON (configured here). When a CVE applies to a pinned
#     dep, Dependabot opens a targeted PR you review and merge manually.
#   - Version updates: intentionally OFF. Per the README's "Updating
#     dependencies" section, non-security bumps must be deliberate, one-at-
#     a-time `uv lock --upgrade-package <name>` commands with diff review.
#
# Cooldown: 7 days. PR creation is delayed one week from the patched
# version's release, giving the upstream ecosystem time to surface broken
# or malicious patches before they land here. Dependabot ALERTS (separate
# feature, always on) still fire immediately on CVE disclosure, so
# visibility is not lost — only the auto-PR is delayed.
#
# Auto-merge: not enabled at the repo level. Every Dependabot PR must be
# manually reviewed. Always read the `uv.lock` diff before clicking merge.

version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
